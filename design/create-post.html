<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedulix • Create Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .platform-checkbox:checked + label {
            background-color: rgb(124 58 237);
            color: white;
            border-color: rgb(124 58 237);
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen">

<div class="flex h-screen overflow-hidden">
    
    <!-- Sidebar (same as dashboard) -->
    <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col -translate-x-full lg:translate-x-0 transition-all duration-300">
        <div class="px-8 py-6 border-b border-zinc-800 flex items-center gap-3">
            <div class="w-10 h-10 bg-violet-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-calendar-days text-white text-2xl"></i>
            </div>
            <span class="logo-font text-3xl font-semibold tracking-tighter text-white">schedulix</span>
        </div>
        
        <div class="flex-1 px-4 py-8 overflow-y-auto">
            <nav class="space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3.5 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200 rounded-2xl">
                    <i class="fa-solid fa-house w-5"></i><span>Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-6 py-3.5 text-white bg-zinc-800 rounded-2xl font-medium">
                    <i class="fa-solid fa-plus w-5"></i><span>Create Post</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-6 py-3.5 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200 rounded-2xl">
                    <i class="fa-solid fa-clock w-5"></i><span>Scheduled Posts</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-6 py-3.5 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200 rounded-2xl">
                    <i class="fa-solid fa-chart-line w-5"></i><span>Analytics</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-6 py-3.5 text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200 rounded-2xl">
                    <i class="fa-solid fa-cog w-5"></i><span>Settings</span>
                </a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Top Bar -->
        <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-2xl text-zinc-400 hover:text-white">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="text-2xl font-semibold text-white">Create New Post</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="window.location.href='dashboard.html'" 
                        class="text-zinc-400 hover:text-white">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
        </header>

        <!-- Form Area -->
        <div class="flex-1 overflow-auto p-6 md:p-10 bg-zinc-950">
            <div class="max-w-3xl mx-auto">
                <form id="createPostForm" onsubmit="handleSubmit(event)" class="space-y-10">
                    
                    <!-- Caption -->
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-sm font-medium text-zinc-400">Caption / Content</label>
                            <button onclick="generateAICaption()" type="button"
                                    class="flex items-center gap-2 text-violet-400 hover:text-violet-300 text-sm font-medium">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                                <span>Generate AI Caption</span>
                            </button>
                        </div>
                        <textarea id="caption" rows="5"
                            class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-6 focus:outline-none focus:border-violet-500 resize-none text-base"
                            placeholder="What do you want to share today?"></textarea>
                    </div>

                    <!-- Image Upload -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-3">Media</label>
                        <div id="upload-area"
                             class="border-2 border-dashed border-zinc-700 hover:border-violet-500 rounded-3xl p-12 text-center transition-colors cursor-pointer">
                            <input type="file" id="media-upload" accept="image/*" class="hidden" onchange="previewImage(event)">
                            <i class="fa-solid fa-cloud-arrow-up text-4xl text-zinc-500 mb-4"></i>
                            <p class="text-zinc-400">Click or drag image here</p>
                            <p class="text-xs text-zinc-500 mt-1">JPG, PNG, GIF up to 10MB</p>
                        </div>
                        
                        <!-- Preview -->
                        <div id="image-preview" class="hidden mt-6">
                            <img id="preview-img" class="max-h-96 w-full object-contain rounded-3xl border border-zinc-700" alt="Preview">
                            <button onclick="removeImage()" type="button"
                                    class="mt-3 text-red-400 hover:text-red-500 text-sm flex items-center gap-2">
                                <i class="fa-solid fa-trash"></i> Remove image
                            </button>
                        </div>
                    </div>

                    <!-- Platforms -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-4">Post to platforms</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <label class="platform-label flex items-center gap-3 bg-zinc-900 border border-zinc-700 hover:border-zinc-600 rounded-2xl p-4 cursor-pointer">
                                <input type="checkbox" class="platform-checkbox hidden" value="instagram">
                                <i class="fa-brands fa-instagram text-3xl text-pink-500"></i>
                                <span class="font-medium">Instagram</span>
                            </label>
                            <label class="platform-label flex items-center gap-3 bg-zinc-900 border border-zinc-700 hover:border-zinc-600 rounded-2xl p-4 cursor-pointer">
                                <input type="checkbox" class="platform-checkbox hidden" value="facebook">
                                <i class="fa-brands fa-facebook text-3xl text-blue-600"></i>
                                <span class="font-medium">Facebook</span>
                            </label>
                            <label class="platform-label flex items-center gap-3 bg-zinc-900 border border-zinc-700 hover:border-zinc-600 rounded-2xl p-4 cursor-pointer">
                                <input type="checkbox" class="platform-checkbox hidden" value="twitter">
                                <i class="fa-brands fa-x-twitter text-3xl text-white"></i>
                                <span class="font-medium">X (Twitter)</span>
                            </label>
                            <label class="platform-label flex items-center gap-3 bg-zinc-900 border border-zinc-700 hover:border-zinc-600 rounded-2xl p-4 cursor-pointer">
                                <input type="checkbox" class="platform-checkbox hidden" value="linkedin">
                                <i class="fa-brands fa-linkedin text-3xl text-blue-700"></i>
                                <span class="font-medium">LinkedIn</span>
                            </label>
                        </div>
                    </div>

                    <!-- Schedule -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-4">When to post?</label>
                        <div class="flex gap-4">
                            <button type="button" onclick="selectSchedule(0)" id="btn-now"
                                    class="flex-1 py-4 rounded-2xl border border-violet-500 bg-violet-600/10 text-white font-medium">
                                Post Now
                            </button>
                            <button type="button" onclick="selectSchedule(1)" id="btn-schedule"
                                    class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:border-zinc-600 font-medium">
                                Schedule for later
                            </button>
                        </div>

                        <!-- Date & Time Picker -->
                        <div id="schedule-picker" class="hidden mt-6 grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">Date</label>
                                <input type="date" id="post-date"
                                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500">
                            </div>
                            <div>
                                <label class="block text-sm text-zinc-400 mb-2">Time</label>
                                <input type="time" id="post-time"
                                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500">
                            </div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="pt-6 border-t border-zinc-800">
                        <button type="submit"
                            class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:brightness-105 transition-all py-5 rounded-3xl font-semibold text-lg shadow-lg shadow-violet-500/30">
                            Schedule Post
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Suppress Tailwind CDN warning
    window.tailwindConfig = { content: [] };

    let selectedSchedule = 0; // 0 = now, 1 = later

    function selectSchedule(mode) {
        selectedSchedule = mode;
        const btnNow = document.getElementById('btn-now');
        const btnSchedule = document.getElementById('btn-schedule');
        const picker = document.getElementById('schedule-picker');
        
        if (mode === 0) {
            btnNow.classList.add('bg-violet-600/10', 'border-violet-500');
            btnSchedule.classList.remove('bg-violet-600/10', 'border-violet-500');
            picker.classList.add('hidden');
        } else {
            btnNow.classList.remove('bg-violet-600/10', 'border-violet-500');
            btnSchedule.classList.add('bg-violet-600/10', 'border-violet-500');
            picker.classList.remove('hidden');
        }
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('image-preview').classList.remove('hidden');
            document.getElementById('upload-area').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removeImage() {
        document.getElementById('image-preview').classList.add('hidden');
        document.getElementById('upload-area').classList.remove('hidden');
        document.getElementById('media-upload').value = '';
    }

    function generateAICaption() {
        const caption = document.getElementById('caption');
        caption.value = "✨ AI generated caption would appear here...\n\nThis is a demo of what the AI caption generator will produce. Professional, engaging, and optimized for your selected platforms!";
        alert("🤖 AI Caption generated! (Demo)");
    }

    function handleSubmit(e) {
        e.preventDefault();
        
        const caption = document.getElementById('caption').value;
        if (!caption.trim()) {
            alert("Please write a caption for your post.");
            return;
        }
        
        const message = selectedSchedule === 0 
            ? "✅ Post published successfully!" 
            : "✅ Post scheduled successfully!";
        
        alert(message + "\n\n(In production this would send the post to your backend.)");
        
        // Reset form after submit (demo)
        setTimeout(() => window.location.href = "dashboard.html", 1500);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
    }

    // Click to upload area
    document.getElementById('upload-area').addEventListener('click', () => {
        document.getElementById('media-upload').click();
    });

    // Initialize
    window.onload = () => selectSchedule(0);
</script>
</body>
</html>
